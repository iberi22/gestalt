name: CI

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Cargo Fmt
        run: cargo fmt --all --check

      - name: Cargo Test Workspace
        run: |
          cargo test -p synapse-agentic --all-targets
          cargo test -p gestalt_core --all-targets
          cargo test -p gestalt_cli --all-targets
          cargo test -p gestalt_timeline --lib
          cargo test -p gestalt_mcp --all-targets
          cargo test -p gestaltctl --all-targets
          cargo test -p gestalt_infra_github --all-targets
          cargo test -p gestalt_infra_embeddings --all-targets
